# ============================================================
# BTC Swing Trading Agent - Configuration (Minimalist)
# ============================================================
general:
  product_id: "BTC-USD"
  base_currency: "USD"
  timezone: "UTC"
  mode: "paper"
  dry_run: true

account:
  starting_equity: 200.0
  quote_precision: 2
  base_precision: 8
  min_order_usd: 1.0

# Fee: 0.3% per side = 0.6% round-trip (maker assumption)
fees:
  maker_rate: 0.0030
  taker_rate: 0.0030
  prefer_maker: true
  fee_buffer_multiplier: 1.0
  slippage_rate: 0.0010

timeframes:
  primary: "ONE_DAY"
  refinement: "FOUR_HOUR"
  weekly: "ONE_WEEK"
  evaluate_on_closed_candles_only: true

regime:
  ema_fast: 50
  ema_slow: 200
  adx_period: 14
  adx_min: 20
  weekly_ema: 21
  require_weekly_rising: true

indicators:
  rsi_period: 14
  rsi_pullback_low: 30
  rsi_pullback_high: 55
  rsi_overbought: 70
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bollinger_period: 20
  bollinger_std: 2.0
  atr_period: 14
  volume_avg_period: 20
  fib_levels: [0.382, 0.5, 0.618]

signals:
  threshold: 60
  weights:
    trend_aligned: 25
    rsi_pullback: 20
    macd_bullish: 20
    volume_confirm: 10
    fib_confluence: 15
    adx_strength: 10

risk:
  risk_per_trade_pct: 0.01
  max_concurrent_positions: 1
  weekly_drawdown_circuit_breaker_pct: 0.07
  enable_circuit_breaker: true

# Exits: minimalist — scale-out at +6.5%, trail at 2.25×ATR
exits:
  initial_stop_pct: 0.035           # 3.5% floor on initial stop
  initial_stop_atr_mult: 2.0        # 2.0x ATR initial stop (max of the two)
  breakeven_trigger_pct: 0.065      # at +6.5%, sell 50% and move stop to entry
  scale_out_trigger_pct: 0.065      # at +6.5% net, sell scale_out_fraction
  scale_out_fraction: 0.50          # sell half
  trail_atr_mult: 2.25              # 2.25x ATR trailing (uses highest CLOSE)
  take_profit_ceiling_pct: 0.999    # no hard TP
  time_stop_days: 999               # no time stop
  use_server_side_oco: true
  enable_thirds_variant: false
  thirds_tier1_pct: 0.05
  thirds_tier2_pct: 0.08

schedule:
  daily_decision_utc: "00:05"
  refinement_every_hours: 4
  monitor_every_minutes: 10
  daily_heartbeat_utc: "12:00"

backtest:
  start_date: "2015-01-01"
  end_date: "2026-06-01"
  initial_equity: 200.0
  success_min_profit_factor: 1.3
  success_max_drawdown_pct: 0.25
  parameter_sensitivity_check: true
  out_of_sample_split_date: "2025-01-01"

data:
  candles_per_request: 300
  rate_limit_sleep_seconds: 0.5
  cache_db_path: "data/candles.sqlite"
  gap_detection: true

alerts:
  enabled: true
  alert_on_buy: true
  alert_on_sell: true
  alert_on_breakeven_move: true
  alert_on_trailing_update: false
  alert_on_circuit_breaker: true
  alert_on_errors: true
  alert_on_start_pause_kill: true
  daily_heartbeat: true
  dedupe_by_trade_id: true
  retry_attempts: 3

logging:
  level: "INFO"
  json_log_path: "logs/agent.log"
  trade_ledger_path: "logs/trades.log"
  rotate_max_bytes: 10485760
  rotate_backups: 5

dashboard:
  host: "127.0.0.1"
  port: 8787
  chart_library: "lightweight-charts"
  refresh_seconds: 5
  state_db_path: "data/state.sqlite"
  require_auth: true